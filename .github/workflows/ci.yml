name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build and run unit tests
        run: ./mvnw -f app/pom.xml -B -DskipITs package
      - name: Run integration tests
        run: ./mvnw -f app/pom.xml -B verify
