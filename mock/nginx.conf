server {
    listen 80;
    server_name _;

    location /api/events {
        alias /usr/share/nginx/html/provider-snapshot.xml;
        add_header Content-Type application/xml;
        add_header Cache-Control "no-store";
    }

    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
