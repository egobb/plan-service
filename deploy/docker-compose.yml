services:
  demo-provider:
    image: nginx:1.27-alpine
    volumes:
      - ../mock/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../mock/provider-snapshot.xml:/usr/share/nginx/html/provider-snapshot.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: egobb
      POSTGRES_USER: egobb
      POSTGRES_PASSWORD: egobb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U egobb -d egobb"]
      interval: 5s
      timeout: 3s
      retries: 20

  traefik:
    image: traefik:v3.1
    environment:
      DOCKER_API_VERSION: "1.41"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # API traffic
      - "--entrypoints.web.address=:8080"
      # Traefik dashboard traffic (MUST be different port)
      - "--entrypoints.traefik.address=:8081"
    ports:
      - "18081:8081" # Traefik dashboard entrypoint
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    healthcheck:
      disable: true
    environment:
      APP_MODE: api
      JDBC_URL: jdbc:postgresql://db:5432/egobb
      DB_URL: jdbc:postgresql://db:5432/egobb
      DB_USER: egobb
      DB_PASSWORD: egobb
      DB_POOL_MAX: ${API_DB_POOL_MAX:-5}
      DB_POOL_MIN_IDLE: ${API_DB_POOL_MIN_IDLE:-1}
      PROVIDER_ID: ${PROVIDER_ID:-provider-1}
      PROVIDER_BASE_URL: ${PROVIDER_BASE_URL:-http://demo-provider}
      PROVIDER_SNAPSHOT_PATH: ${PROVIDER_SNAPSHOT_PATH:-/api/events}
    expose:
      - "8080"
    ports:
      - "18080:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/search`) || PathPrefix(`/actuator`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8080"
    depends_on:
      db:
        condition: service_healthy
      demo-provider:
        condition: service_healthy

  worker-fetch:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      APP_MODE: worker-fetch
      JDBC_URL: jdbc:postgresql://db:5432/egobb
      DB_URL: jdbc:postgresql://db:5432/egobb
      DB_USER: egobb
      DB_PASSWORD: egobb
      DB_POOL_MAX: ${FETCH_DB_POOL_MAX:-2}
      DB_POOL_MIN_IDLE: ${FETCH_DB_POOL_MIN_IDLE:-1}
      PROVIDER_ID: ${PROVIDER_ID:-provider-1}
      PROVIDER_BASE_URL: ${PROVIDER_BASE_URL:-http://demo-provider}
      PROVIDER_SNAPSHOT_PATH: ${PROVIDER_SNAPSHOT_PATH:-/api/events}
      WORKER_LOCK_ENABLED: ${WORKER_LOCK_ENABLED:-true}
      WORKER_FETCH_POLL_INTERVAL_MS: ${WORKER_FETCH_POLL_INTERVAL_MS:-30000}
      WORKER_FETCH_BATCH_SIZE: ${WORKER_FETCH_BATCH_SIZE:-500}
      WORKER_FETCH_LOCK_NAME: ${WORKER_FETCH_LOCK_NAME:-worker:fetch}
    depends_on:
      db:
        condition: service_healthy
      demo-provider:
        condition: service_healthy

  worker-process:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      APP_MODE: worker-process
      DB_URL: jdbc:postgresql://db:5432/egobb
      JDBC_URL: jdbc:postgresql://db:5432/egobb
      DB_USER: egobb
      DB_PASSWORD: egobb
      DB_POOL_MAX: ${PROCESS_DB_POOL_MAX:-3}
      DB_POOL_MIN_IDLE: ${PROCESS_DB_POOL_MIN_IDLE:-1}
      PROVIDER_ID: ${PROVIDER_ID:-provider-1}
      WORKER_PROCESS_POLL_INTERVAL_MS: ${WORKER_PROCESS_POLL_INTERVAL_MS:-30000}
      WORKER_PROCESS_BATCH_SIZE: ${WORKER_PROCESS_BATCH_SIZE:-200}
      WORKER_PROCESS_MAX_ATTEMPTS: ${WORKER_PROCESS_MAX_ATTEMPTS:-3}
      WORKER_PROCESS_REQUEUE_INTERVAL_MS: ${WORKER_PROCESS_REQUEUE_INTERVAL_MS:-60000}
      WORKER_PROCESS_STUCK_TTL_MS: ${WORKER_PROCESS_STUCK_TTL_MS:-600000}
    depends_on:
      db:
        condition: service_healthy

  adminer:
    image: adminer:4
    container_name: egobb-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
